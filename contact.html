<main class="container">

  <div class="form">
    <h2>Contact Us</h2>

    <p>
      Email:
      <a href="mailto:mphoentlebakery@example.com">mphoentlebakery@example.com</a>
      <br />
      Phone: +267 78182722
      <br />
      Location: Gaborone, Botswana

    <h3>Quick Order Form </h3>

    <form>
      <label for="name">Full Name</label>
      <input id="name" type="text" placeholder="e.g. Mpho Molefe" required />

      <label for="product">Product</label>
      <select id="product" required>
        <option value="">-- Select --</option>
        <option>Bread (Large loaf)</option>
        <option>Scones (6 pack)</option>
        <option>Cupcakes (Box of 4)</option>
        <option>Custom Cake</option>
      </select>

      <label for="message">Order Details</label>
      <textarea id="message" rows="5" placeholder="e.g. Chocolate cake, write 'Happy Birthday Neo'..."></textarea>

      <button type="button" onclick="alert('Form demo: In real projects, connect to a server or Google Forms!')">
        Send 
      </button>
    </form>
